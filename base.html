<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}我的技术博客{% endblock %}</title>
    <!-- 加上一点点简单的样式，让页面看得过去 -->
    <style>
    /* 主题色变量：定义整体配色，让页面视觉更统一 */
    :root {
      --bg: #07111f;
      --panel: rgba(8, 15, 30, 0.82);
      --text: #f5f7ff;
      --muted: #8e9bbf;
      --accent: #5bc0ff;
      --accent-2: #8d7cff;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
    }

    /* 通用重置：确保不同浏览器下显示一致 */
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(91, 192, 255, .24), transparent 28%),
        radial-gradient(circle at bottom right, rgba(141, 124, 255, .26), transparent 22%),
        linear-gradient(135deg, var(--bg), #0f1b32 60%, #0a1122);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 60px;
      position: relative;
      z-index: 1;
    }

    /* 页面内容区域，给页面正文增加垂直间距 */
    .page-content {
      padding-top: 20px;
      min-height: calc(100vh - 200px);
    }

    .ambient {
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .ambient.one {
      top: -80px;
      left: -60px;
      background: #5bc0ff;
    }

    .ambient.two {
      bottom: 80px;
      right: -60px;
      background: #8d7cff;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      position: sticky;
      top: 12px;
      z-index: 10;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .nav {
      display: flex;
      gap: 16px;
      color: var(--muted);
    }

    .nav a:hover {
      color: var(--text);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      padding: 34px 0 22px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-card,
    .side-card,
    .post-card,
    .about-card,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero-card {
      padding: 36px;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.8rem;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(91, 192, 255, 0.18);
      color: #bfeeff;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
      width: fit-content;
    }

    h1 {
      font-size: clamp(2rem, 3.3vw, 3rem);
      margin: 0 0 12px;
      line-height: 1.1;
    }

    .lead {
      font-size: 1.02rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 640px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
      transition: transform .2s ease, background .2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .edit-trigger {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--border);
      font-weight: 600;
      transition: transform .2s ease, background .2s ease;
    }

    .edit-trigger:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.14);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      z-index: 25;
      padding: 20px;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal {
      width: min(680px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: rgba(8, 15, 30, 0.98);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: 1.3rem;
    }

    .modal label {
      display: block;
      margin: 18px 0 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .modal input,
    .modal textarea {
      width: 100%;
      min-height: 44px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      resize: vertical;
    }

    .modal textarea {
      min-height: 100px;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .modal-close,
    .modal-save {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      padding: 12px 18px;
      font-weight: 600;
    }

    .modal-close {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .modal-save {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: white;
    }

    .status-tip {
      margin-top: 12px;
      color: var(--accent);
      font-size: 0.95rem;
    }

    .side-card {
      padding: 22px;
      display: grid;
      gap: 12px;
    }

    .stat {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .weather-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(11, 18, 36, 0.9);
      border: 1px solid rgba(91, 192, 255, 0.16);
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .weather-header strong {
      font-size: 1rem;
    }

    .weather-temp {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin: 0;
    }

    .weather-desc {
      color: var(--muted);
      margin: 0;
      font-size: 0.95rem;
    }

    .weather-meta {
      color: #9db5d8;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
    }

    .weather-search {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 12px;
    }

    .weather-search input {
      width: 100%;
      min-height: 44px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }

    .weather-search button {
      min-width: 100px;
      border-radius: 999px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: white;
      border: none;
      cursor: pointer;
    }

    .weather-search button:hover {
      opacity: 0.92;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: #dfe9ff;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
    }

    .panel-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }

    .panel {
      padding: 20px;
    }

    .panel h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .panel p {
      color: var(--muted);
      line-height: 1.75;
      margin: 0;
    }

    .topic-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .topic-item {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .topic-item span:last-child {
      color: #9db5d8;
      font-size: 0.9rem;
    }

    .gallery-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 18px;
    }

    .gallery-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .gallery-card img,
    .gallery-card video {
      width: 100%;
      height: auto;
      display: block;
    }

    .gallery-card p {
      margin: 0;
      padding: 16px;
      color: var(--muted);
      line-height: 1.75;
    }

    .gallery-card video {
      max-height: 280px;
      background: black;
    }

    .album-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 18px;
    }

    .album-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .2s ease, border-color .2s ease;
    }

    .album-card:hover {
      transform: translateY(-2px);
      border-color: rgba(91, 192, 255, 0.35);
    }

    .album-cover {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .album-info {
      padding: 18px;
    }

    .album-title {
      margin: 0 0 10px;
      font-size: 1.05rem;
      color: var(--text);
    }

    .album-meta {
      margin: 0;
      color: #9db5d8;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .album-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .album-btn {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background .2s ease, transform .2s ease;
    }

    .album-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    .album-btn.delete {
      color: #ff8b8b;
      border-color: rgba(255,140,140,0.22);
    }

    .album-detail {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 20px;
    }

    .album-detail.active {
      display: flex;
    }

    .album-detail-inner {
      width: min(1120px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: rgba(8, 15, 30, 0.98);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .image-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .image-card {
      overflow: hidden;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: transform .2s ease;
    }

    .image-card:hover {
      transform: translateY(-2px);
    }

    .image-card img,
    .image-card video {
      width: 100%;
      height: 170px;
      object-fit: cover;
      display: block;
    }

    .image-card p {
      margin: 0;
      padding: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .image-card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 12px 12px;
    }

    .image-card-actions button {
      flex: 1 1 auto;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background .2s ease;
    }

    .image-card-actions button:hover {
      background: rgba(255,255,255,0.12);
    }

    .image-card-actions button.delete {
      color: #ff8b8b;
      border-color: rgba(255,140,140,0.22);
    }

    .album-modal textarea,
    .album-modal input {
      width: 100%;
      font: inherit;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      margin-top: 8px;
    }

    .album-modal textarea {
      min-height: 140px;
      resize: vertical;
    }

    .album-modal .status-tip {
      margin-top: 12px;
      color: #9db5d8;
    }

    @media (max-width: 900px) {
      .gallery-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }

    .site-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .site-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      transition: background .2s ease, transform .2s ease;
    }

    .site-item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }

    .site-item span:last-child {
      color: #9db5d8;
      font-size: 0.95rem;
    }

    .timeline {
      list-style: none;
      padding: 0;
      margin: 12px 0 0;
      display: grid;
      gap: 12px;
    }

    .timeline li {
      padding-left: 16px;
      border-left: 2px solid rgba(91, 192, 255, 0.35);
      position: relative;
    }

    .timeline li::before {
      content: "";
      position: absolute;
      left: -5px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
    }

    .timeline strong {
      display: block;
      margin-bottom: 4px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 26px 0 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .post-card {
      padding: 22px;
      transition: transform .2s ease, border-color .2s ease;
    }

    .post-card:hover {
      transform: translateY(-2px);
      border-color: rgba(91, 192, 255, 0.35);
    }

    .post-link {
      display: block;
      color: inherit;
      text-decoration: none;
    }

    .post-link:hover .post-card {
      transform: translateY(-2px);
      border-color: rgba(91, 192, 255, 0.35);
    }

    .post-card h3 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }

    .post-card p {
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 12px;
    }

    .meta {
      color: #9db5d8;
      font-size: 0.9rem;
    }

    .about-card {
      padding: 24px;
      margin-top: 18px;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .avatar {
      min-height: 240px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(91, 192, 255, 0.3), rgba(141, 124, 255, 0.28));
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: white;
    }

    .about-text {
      color: var(--muted);
      line-height: 1.8;
    }

    .footer {
      margin-top: 28px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 900px) {

      .hero,
      .about-card,
      .panel-grid {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100%, calc(100% - 20px));
        padding: 14px 0 40px;
      }

      .topbar {
        border-radius: 18px;
        flex-direction: column;
        gap: 12px;
        padding: 14px 16px;
      }

      .nav {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px 14px;
      }

      .hero {
        padding: 20px 0 16px;
        gap: 16px;
      }

      .hero-card {
        padding: 20px;
        min-height: auto;
      }

      h1 {
        font-size: 1.7rem;
      }

      .lead {
        font-size: 0.96rem;
      }

      .hero-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .side-card,
      .post-card,
      .about-card,
      .panel {
        padding: 16px;
      }

      .avatar {
        min-height: 180px;
        font-size: 2.4rem;
      }

      .section-title {
        margin: 20px 0 10px;
        font-size: 0.95rem;
      }

      .topic-item {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
    <!-- 视差背景光晕，增强页面视觉效果 -->
    <div class="ambient one"></div>
    <div class="ambient two"></div>

    <div class="wrap">
      <!-- 顶部导航栏：页面公共部分 -->
      <header class="topbar">
        <div class="brand">技术博客</div>
        <nav class="nav">
          <a href="{{ url_for('index') }}">首页</a>
          <a href="{{ url_for('index') }}#posts">文章</a>
          <a href="{{ url_for('about') }}">关于</a>
        </nav>
      </header>

      <!-- 页面主体内容区，子页面内容将注入此处 -->
      <main class="page-content">
        {% block content %}
        <!-- 子页面的具体内容会替换到这里 -->
        {% endblock %}
      </main>

      <!-- 页脚信息 -->
      <footer class="footer">
        © 2026 Flask 技术博客 - 由 Python 驱动
      </footer>
    </div>
</body>
</html>
